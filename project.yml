name: Unstuck

options:
  bundleIdPrefix: tech.csalliance
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  UnstuckKit:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"

targets:
  Unstuck:
    type: application
    platform: iOS
    sources:
      - App
    configFiles:
      Debug: App/Config.xcconfig
      Release: App/Config.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.csalliance.unstuck
        PRODUCT_NAME: Unstuck
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    dependencies:
      - package: UnstuckKit
        product: UnstuckCore
      - package: UnstuckKit
        product: UnstuckData
      - package: UnstuckKit
        product: UnstuckSync
      - package: UnstuckKit
        product: UnstuckDesign
    scheme:
      testTargets: []
