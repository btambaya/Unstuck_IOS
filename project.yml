name: Unstuck

options:
  bundleIdPrefix: tech.csalliance
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  UnstuckKit:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    # No DEVELOPMENT_TEAM hardcoded — whoever opens the project selects their
    # own team in Signing & Capabilities (portable across machines/accounts).
  configs:
    # Simulator/dev builds skip signing; Release (archive) signs automatically.
    Debug:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"

targets:
  Unstuck:
    type: application
    platform: iOS
    sources:
      - App
    configFiles:
      Debug: App/Config.xcconfig
      Release: App/Config.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.csalliance.unstuck
        PRODUCT_NAME: Unstuck
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: App/Unstuck.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: UnstuckKit
        product: UnstuckCore
      - package: UnstuckKit
        product: UnstuckData
      - package: UnstuckKit
        product: UnstuckSync
      - package: UnstuckKit
        product: UnstuckDesign
      - package: UnstuckKit
        product: UnstuckShared
      - target: UnstuckWidgets
        embed: true
    scheme:
      testTargets:
        - UnstuckUITests

  UnstuckUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: Unstuck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.csalliance.unstuck.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: Unstuck
        TARGETED_DEVICE_FAMILY: "1"

  UnstuckWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets
    configFiles:
      Debug: App/Config.xcconfig
      Release: App/Config.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.csalliance.unstuck.widgets
        PRODUCT_NAME: UnstuckWidgets
        INFOPLIST_FILE: Widgets/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: Widgets/UnstuckWidgets.entitlements
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: UnstuckKit
        product: UnstuckShared
