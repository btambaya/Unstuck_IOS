name: Unstuck

options:
  bundleIdPrefix: io.unstucknow
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  UnstuckKit:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    # Ahmad's own paid Apple Developer team (active 2026-06-11).
    DEVELOPMENT_TEAM: M9ULD6M5Z3
    # Single source of truth for the version + build, shared by the app AND the
    # widget extension (their Info.plists reference these) so they never drift
    # apart — a mismatch trips App Store warning 90473. Bump CURRENT_PROJECT_VERSION
    # here for each new build.
    MARKETING_VERSION: "1.0.4"
    CURRENT_PROJECT_VERSION: "25"
  configs:
    # Simulator/dev builds skip signing; Release (archive) signs automatically.
    Debug:
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGNING_REQUIRED: "NO"

targets:
  Unstuck:
    type: application
    platform: iOS
    sources:
      # The App glob bundles App/PrivacyInfo.xcprivacy (the privacy manifest —
      # required-reason UserDefaults declaration + nutrition-label data) as a
      # resource; the widget target shares the same file below.
      - App
    configFiles:
      Debug: App/Config.xcconfig
      Release: App/Config.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.unstucknow.app
        PRODUCT_NAME: Unstuck
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: App/Unstuck.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        CODE_SIGN_STYLE: Automatic
      # aps-environment is substituted into Unstuck.entitlements from this
      # per-config build setting. Debug (Xcode/device) → sandbox APNs; Release
      # (archive/TestFlight/App Store) → production APNs. Previously hardcoded
      # `development` for ALL configs, so TestFlight builds registered a SANDBOX
      # token while PushClient reported "production" → the production gateway
      # rejected it → push silently failed for testers. PushClient's #if DEBUG
      # sandbox/production reporting already matches these per-config values.
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    dependencies:
      - package: UnstuckKit
        product: UnstuckCore
      - package: UnstuckKit
        product: UnstuckData
      - package: UnstuckKit
        product: UnstuckSync
      - package: UnstuckKit
        product: UnstuckDesign
      - package: UnstuckKit
        product: UnstuckShared
      - target: UnstuckWidgets
        embed: true
    scheme:
      testTargets:
        - UnstuckAppTests
        - UnstuckUITests

  # App-layer UNIT tests (host: Unstuck). The SPM package modules are tested
  # via `swift test`; this target covers the pure logic that lives in App/
  # (lane layout, settings hydration, the recovery-session JWT probe) which
  # `swift test` can't reach. Hosted by the app so `@testable import Unstuck`
  # sees its internal symbols.
  UnstuckAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/UnstuckAppTests
    dependencies:
      - target: Unstuck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.unstucknow.app.apptests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Unstuck.app/Unstuck"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TARGETED_DEVICE_FAMILY: "1"

  UnstuckUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: Unstuck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.unstucknow.app.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: Unstuck
        TARGETED_DEVICE_FAMILY: "1"

  UnstuckWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets
      # Shared privacy manifest — the widget also touches UserDefaults via the
      # App Group suite (AppGroup.swift), so it needs its own bundled copy.
      - path: App/PrivacyInfo.xcprivacy
        buildPhase: resources
    configFiles:
      Debug: App/Config.xcconfig
      Release: App/Config.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.unstucknow.app.widgets
        PRODUCT_NAME: UnstuckWidgets
        INFOPLIST_FILE: Widgets/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: Widgets/UnstuckWidgets.entitlements
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: UnstuckKit
        product: UnstuckShared
